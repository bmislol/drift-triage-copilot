name: Agent CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    
    steps:
      # 1. Grab your code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install Astral's uv
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # 3. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 4. Install dependencies and run tests
      - name: Run Tests
        working-directory: ./agent
        env:
          POSTGRES_DSN: "postgresql://dummy:dummy@localhost:5432/dummy"
          REDIS_URL: "redis://localhost:6379/0"
          MLFLOW_TRACKING_URI: "http://localhost:5000"
          AGENT_WEBHOOK_URL: "http://localhost:8001/webhook"
          ANTHROPIC_API_KEY: "sk-ant-dummy-key"
        run: |
          uv sync --no-cache
          PYTHONPATH=.:.. uv run pytest tests/