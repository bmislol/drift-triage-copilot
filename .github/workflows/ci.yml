name: Agent CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    
    steps:
      # 1. Grab your code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install Astral's uv
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # 3. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 4. Install dependencies and run tests
      - name: Run Tests
        working-directory: ./agent
        run: |
          uv sync --no-cache
          PYTHONPATH=. uv run pytest tests